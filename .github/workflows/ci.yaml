name: CI
on:
  push:
    branches:
      - main
  pull_request:
# Least privilege: the jobs only checkout + build/test, so the workflow token
# needs no more than read access to repository contents.
permissions:
  contents: read
jobs:
  # rainix reusable workflows, pinned to @main so toolchain/CI updates
  # auto-propagate (the rainix convention). wasm-test is intentionally omitted:
  # it runs `cargo test --target wasm32 --workspace` (no --lib), which would try
  # to compile the native-only `backend` crate (tokio/reqwest) to wasm. rs-wasm
  # builds with --lib, so it covers recipe-core and skips backend.
  rs-static:
    uses: rainlanguage/rainix/.github/workflows/rainix-rs-static.yaml@main
    secrets: inherit
  rs-test:
    uses: rainlanguage/rainix/.github/workflows/rainix-rs-test.yaml@main
    secrets: inherit
  rs-wasm:
    uses: rainlanguage/rainix/.github/workflows/rainix-rs-wasm.yaml@main
    secrets: inherit
  # The frontend, which nothing else here covers: the rs-* jobs are Rust only, so
  # until this existed `svelte-check` ran exactly when someone remembered to run
  # it, and a broken SPA could land on a green PR.
  #
  # Inlined rather than a rainix reusable because rainix has no node workflow —
  # its rs-static even notes that "frontend repos format svelte/ts via their own
  # pipeline". The shared *setup* is still reused via rainix's composite action,
  # so nix + cachix stay one implementation.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: rainlanguage/rainix/.github/actions/nix-cachix-setup@main
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # `npm ci`, not `install`: CI must build the locked tree, and fail if the
      # lockfile and package.json disagree rather than quietly resolving.
      - run: nix develop -c npm --prefix frontend ci
      # svelte-check: types across .svelte + .ts. The whole reason for this job.
      - run: nix develop -c npm --prefix frontend run check
      # Design-system enforcement (the ratchet): fail the build if a surface
      # reaches past the tokens — raw hex, Tailwind's default palette, white/black,
      # arbitrary colours, a serif — or if a component ships without a story. A
      # system nobody enforces decays; this is the enforcement.
      - run: nix develop -c npm --prefix frontend run lint
      # The SPA must actually build. Env vars are deliberately unset: with
      # `$env/dynamic/public` they are read at runtime from the generated
      # `_app/env.js`, so a build proves compilation without pretending to prove
      # configuration.
      - run: nix develop -c npm --prefix frontend run build
      # Every UI state is a story (see README), so a story that no longer
      # compiles is a broken contract, not a broken extra.
      - run: nix develop -c npm --prefix frontend run build-storybook
      # The visual fence. The design lint proves a surface *uses* the tokens; it
      # cannot prove the render still *looks* right (a collision, an overflow, a
      # silent font fallback all pass it). So re-render every story full-page with
      # the pinned chromium + fonts (two runs diff by 0px — deterministic), and
      # pixel-diff against the committed baselines. Any change fails the build.
      - run: nix run .#visual-shoot
      - run: nix develop -c npm --prefix frontend run visual:diff
      # A failure is feedback to *read*, not a wall: publish the triptychs
      # (baseline | current | diff, one PNG per changed story) so the reviewer —
      # human or agent — looks at the actual pixels and decides intended-or-not.
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: frontend/tests/visual/__diff__/
          if-no-files-found: ignore
